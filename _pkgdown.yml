url: https://boldr.circadia-lab.uk

template:
  bootstrap: 5
  bslib:
    # ── Colours (deep indigo + BOLD activation palette) ───────────────────────
    # indigo  #1B1035  | rose    #C23661  | steel   #3D6FA8
    # amber   #E8803E  | cloud   #F2EEF9  | mist    #E8E4F0
    bg:              "#F2EEF9"
    fg:              "#1B1035"
    primary:         "#C23661"
    secondary:       "#3D6FA8"
    success:         "#3D6FA8"
    info:            "#E8803E"
    warning:         "#E8803E"
    danger:          "#C23661"

    # ── Fonts ──────────────────────────────────────────────────────────────────
    base_font:    {google: "DM Sans"}
    heading_font: {google: "DM Sans"}
    code_font:    {google: "JetBrains Mono"}

    # ── Typography ─────────────────────────────────────────────────────────────
    font-size-base:       "1rem"
    headings-font-weight: 700

    # ── Cards / surfaces ───────────────────────────────────────────────────────
    card-bg:              "#FDFBFF"
    card-border-color:    "#D8D0EA"
    card-border-radius:   "0.75rem"

    # ── Code blocks ────────────────────────────────────────────────────────────
    pre-bg:    "#1B1035"
    pre-color: "#F2EEF9"

  includes:
    in_header: |
      <meta property="og:image" content="https://boldr.circadia-lab.uk/logo.png">
      <meta property="og:image:width" content="1080">
      <meta property="og:image:height" content="1080">
      <meta property="og:image:type" content="image/png">
      <meta name="twitter:card" content="summary">
      <meta name="twitter:image" content="https://boldr.circadia-lab.uk/logo.png">
      <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#C23661">
      <meta name="msapplication-TileColor" content="#3D6FA8">
      <meta name="theme-color" content="#3D6FA8">
      <style>
        /* ── Navbar ── */
        .navbar {
          background-color: #1B1035 !important;
          border-bottom: 3px solid #C23661;
        }
        .navbar .navbar-brand,
        .navbar-nav .nav-link,
        .navbar-nav .nav-link:hover,
        .navbar form .btn {
          color: #F2EEF9 !important;
        }
        .navbar-nav .nav-link:hover { opacity: 0.85; }
        .navbar-nav .nav-link.active {
          color: #F2EEF9 !important;
          border-bottom: 2px solid #C23661;
        }
        .navbar small.nav-text { color: #F2EEF9 !important; opacity: 0.75; }

        /* ── Navbar logo size ── */
        .navbar-brand img { height: 40px; width: auto; }

        /* ── Page title ── */
        .page-header { border-bottom: none !important; }

        /* ── Sidebar TOC ── */
        .sidebar .nav-link,
        .sidebar a,
        #toc a,
        #toc .nav-link {
          color: #1B1035 !important;
        }
        .sidebar .nav-link:hover,
        .sidebar a:hover,
        #toc a:hover {
          color: #C23661 !important;
        }
        .sidebar .nav-link.active,
        #toc .nav-link.active {
          color: #C23661 !important;
          border-left: 2px solid #E8803E;
          font-weight: 600;
        }

        /* ── text-muted ── */
        .text-muted { color: #5A4F70 !important; }

        /* ── Sidebar border ── */
        .sidebar { border-left: 3px solid #E8803E; padding-left: 1rem; }

        /* ── Reference index section headers ── */
        .reference-index h2 {
          color: #C23661;
          font-size: 0.8rem;
          text-transform: uppercase;
          letter-spacing: 0.08em;
        }

        /* ── Inline code ── */
        code {
          color: #C23661;
          background: #EDE8F5;
          border-radius: 4px;
          padding: 0.1em 0.35em;
        }

        /* ── Links ── */
        a { color: #C23661; }
        a:hover { color: #3D6FA8; }

        /* ── Footer ── */
        .footer { background: #1B1035; color: #F2EEF9; padding: 1.5rem 0; }
        .footer a { color: #F2EEF9; opacity: 0.85; }
        .footer a:hover { opacity: 1; }

        /* ── Search ── */
        #search-input { border-color: #E8803E; }

        /* ── Buttons ── */
        .btn-primary {
          background-color: #C23661 !important;
          border-color: #C23661 !important;
          color: #F2EEF9 !important;
        }
        .btn-primary:hover {
          background-color: #3D6FA8 !important;
          border-color: #3D6FA8 !important;
        }
      </style>

logo: man/figures/logo.svg

opengraph:
  image:
    src: https://boldr.circadia-lab.uk/logo.png
    alt: "boldR — fMRI BOLD signal analysis for R"
  twitter:
    creator: "@circadia_lab"
    card: summary

home:
  title: "boldR — fMRI BOLD signal analysis for R"
  description: >
    An R package for analysing BOLD fMRI data in sleep and circadian research.
    Reads fMRIPrep derivatives, supports atlas-agnostic parcellation, computes
    voxelwise and ROI-level metrics, and exports to syncR. Part of the
    Circadia Lab R ecosystem at Northumbria University.
  links:
  - text: Circadia Lab
    href: https://circadia-lab.uk
  sidebar:
    structure: [links, license, community, citation, authors, dev]

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/getting-started.html
    github:
      icon: fab fa-github
      href: https://github.com/circadia-bio/boldR
      aria-label: GitHub

reference:
  - title: "Ingestion"
    desc: "Read and validate fMRIPrep BIDS derivatives."
    contents:
      - read_fmriprep
      - prepare_bold

  - title: "Atlases"
    desc: "Atlas-agnostic parcellation schema and built-in atlases."
    contents:
      - load_atlas
      - list_atlases

  - title: "Parcellation"
    desc: "Extract ROI-level timeseries from volumetric BOLD data."
    contents:
      - parcellate

  - title: "Voxelwise metrics"
    desc: "Metrics computed at the voxel level."
    contents:
      - compute_tsnr

  - title: "ROI metrics"
    desc: "Metrics computed at the ROI/parcellation level."
    contents:
      - compute_fc
      - compute_roi_metrics

  - title: "Export"
    desc: "Export analysis-ready outputs for syncR."
    contents:
      - export_bold

  - title: "Package"
    desc: "Package-level documentation."
    contents:
      - boldR-package

articles:
  - title: "Getting started"
    navbar: ~
    contents:
      - getting-started

news:
  releases:
  - text: "Changelog"
    href: news/index.html

authors:
  Lucas França:
    href: https://orcid.org/0000-0003-0853-1319
  Mario Leocadio-Miguel:
    href: https://orcid.org/0000-0002-7248-3529

footer:
  structure:
    left:  [package, developed_by]
    right: [built_with]
  components:
    package: >
      **boldR** — Circadia Lab, Northumbria University.
    developed_by: >
      Lucas França & Mario Leocadio-Miguel.
